version: 2
formats:
- epub
- pdf
build:
  os: ubuntu-lts-latest
  tools:
    python: latest
    rust: latest
  apt_packages:
  - pandoc
  jobs:
    post_install:
    - python -m ipykernel install --user --name python3
sphinx:
  configuration: docs/conf.py
  fail_on_warning: true
python:
  install:
  - method: pip
    path: .
    extra_requirements:
    - docs
